<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="X-Drone 官方智能售后助手">
    <meta name="theme-color" content="#1e3c72">
    <title>X-Drone 智能售后 | 官方客服</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app-container">
    <header class="chat-header">
        <div class="header-info">
            <div class="bot-avatar"><i class="fas fa-robot"></i></div>
            <div class="bot-details">
                <h1>X-Drone 售后专家 · 小智</h1>
                <div class="status"><span class="online-dot"></span> 在线 · 秒级回复</div>
            </div>
        </div>
        <button class="history-btn" id="historyBtn"><i class="fas fa-history"></i> 记录</button>
    </header>
    <div class="tabs-container">
        <button class="tab active" data-tab="chat"><i class="fas fa-comment-dots"></i> 智能客服</button>
        <button class="tab" data-tab="admin"><i class="fas fa-cogs"></i> 后台管理</button>
    </div>
    <main class="chat-main" id="chatMain">
        <div class="messages-area" id="chatBox" role="log" aria-live="polite"></div>
        <div class="quick-actions">
            <button class="quick-btn" data-msg="X-Drone Pro 参数">🚁 Pro 参数</button>
            <button class="quick-btn" data-msg="保修政策是什么？">📄 保修政策</button>
            <button class="quick-btn" data-msg="E1001 故障代码">⚠️ 故障 E1001</button>
            <button class="quick-btn" data-msg="订单查询">📦 订单查询</button>
        </div>
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入您的问题，例如：Mini 价格多少？" rows="1"></textarea>
            <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            <button id="newSessionBtn" class="new-session-btn"><i class="fas fa-plus"></i></button>
        </div>
    </main>
    <div class="admin-view hidden" id="adminView">
        <h3><i class="fas fa-history"></i> 最近对话记录</h3>
        <div style="overflow-x: auto;"><table id="logTable"><thead><tr><th>时间</th><th>用户ID</th><th>会话ID</th><th>提问</th><th>AI回复</th></tr></thead><tbody></tbody></table></div>
        <h3><i class="fas fa-database"></i> FAQ 管理</h3>
        <div class="input-area small"><input type="text" id="faqQ" placeholder="问题"><input type="text" id="faqA" placeholder="答案"><button class="small" id="addFaqBtn">添加/更新</button></div>
        <div style="overflow-x: auto;"><table id="faqTable"><thead><tr><th>问题</th><th>答案</th><th>操作</th></tr></thead><tbody></tbody></table></div>
    </div>
    <div id="historyModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-history"></i> 我的历史对话</h3><button id="closeHistoryBtn">&times;</button></div><div class="modal-body" id="historyModalBody">加载中...</div></div></div>
    <div id="orderModal" class="modal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-truck"></i> 订单查询</h3><button id="closeOrderBtn">&times;</button></div><div class="modal-body"><input type="text" id="orderIdInput" placeholder="订单号，例如 XD123456789"><button id="queryOrderBtn">查询</button><div id="orderResult"></div></div></div></div>
</div>
<script src="/js/script.js"></script>
</body>
</html>
