<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>X-Drone 智能售后</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app-container">
    <header class="chat-header">
        <div class="header-info">
            <div class="bot-avatar"><i class="fas fa-robot"></i></div>
            <div class="bot-details">
                <h1>X-Drone 售后专家 · 小智</h1>
                <div class="status"><span class="online-dot"></span> 在线 · 秒级回复</div>
            </div>
        </div>
        <div class="user-area">
            <span id="userNameDisplay">未登录</span>
            <button id="loginBtn" class="small-btn">登录/注册</button>
            <button id="logoutBtn" class="small-btn hidden">退出</button>
        </div>
    </header>

    <div class="tabs-container">
        <button class="tab active" data-tab="chat"><i class="fas fa-comment-dots"></i> 智能客服</button>
        <button class="tab" data-tab="shop"><i class="fas fa-store"></i> 商城</button>
        <button class="tab" data-tab="orders"><i class="fas fa-list-ul"></i> 我的订单</button>
        <button class="tab" data-tab="admin"><i class="fas fa-cogs"></i> 后台管理</button>
    </div>

    <!-- 客服视图 -->
    <main id="chatMain" class="chat-main">
        <div class="messages-area" id="chatBox" role="log" aria-live="polite"></div>
        <div class="quick-actions">
            <button class="quick-btn" data-msg="X-Drone Pro 参数">🚁 Pro 参数</button>
            <button class="quick-btn" data-msg="保修政策是什么？">📄 保修政策</button>
            <button class="quick-btn" data-msg="E1001 故障代码">⚠️ 故障 E1001</button>
            <button class="quick-btn" data-msg="订单查询">📦 订单查询</button>
        </div>
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入您的问题..." rows="1"></textarea>
            <button id="historyBtn" class="send-btn" style="background:#6c757d;" title="我的历史"><i class="fas fa-history"></i></button>
            <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
            <button id="newSessionBtn" class="new-session-btn"><i class="fas fa-plus"></i></button>
        </div>
    </main>

    <!-- 商城视图 -->
    <div id="shopView" class="hidden view-container">
        <h3><i class="fas fa-fire"></i> 热门商品</h3>
        <div id="productList" class="product-grid"></div>
    </div>

    <!-- 订单视图 -->
    <div id="ordersView" class="hidden view-container">
        <h3><i class="fas fa-truck"></i> 我的订单</h3>
        <div id="ordersList"></div>
    </div>

    <!-- 后台管理视图 -->
    <div id="adminView" class="hidden view-container">
        <!-- 最近对话记录（折叠） -->
        <h3 style="cursor:pointer;" id="toggleLogBtn">
            <i class="fas fa-chevron-down" id="logArrow"></i> 最近对话记录
        </h3>
        <div id="logContainer" style="overflow-x:auto;">
            <table id="logTable">
                <thead><tr><th>时间</th><th>用户</th><th>会话ID</th><th>提问</th><th>AI回复</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <h3><i class="fas fa-boxes"></i> 商品库存管理</h3>
        <div id="productManagement" style="margin-bottom: 30px;">
            <table id="productTable" style="width:100%; margin-bottom: 20px;">
                <thead>
                    <tr>
                        <th>商品名称</th>
                        <th>价格</th>
                        <th>当前库存</th>
                        <th>调整库存</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div style="background:#f1f5f9; padding: 16px; border-radius: 16px;">
                <h4>➕ 上架新产品</h4>
                <div style="display: flex; flex-wrap: wrap; gap: 12px;">
                    <input type="text" id="newProdName" placeholder="商品名称" style="flex:1; padding:8px;">
                    <input type="text" id="newProdDesc" placeholder="简短描述" style="flex:1; padding:8px;">
                    <input type="text" id="newProdPrice" placeholder="显示价格 如 ¥3,499" style="width:140px; padding:8px;">
                    <input type="number" id="newProdPriceYuan" placeholder="价格(元) 如 8999" style="width:120px; padding:8px;" step="1">
                    <input type="number" id="newProdStock" placeholder="库存" style="width:100px; padding:8px;">
                    <input type="text" id="newProdImage" placeholder="图片URL(可选)" style="flex:1; padding:8px;">
                    <button id="addProductBtn" class="small" style="background:#28a745;">上架新产品</button>
                </div>
            </div>
        </div>

        <!-- 订单管理 -->
        <h3><i class="fas fa-truck"></i> 订单管理</h3>
        <div style="overflow-x:auto;">
            <table id="adminOrderTable">
                <thead>
                    <tr>
                        <th>订单号</th>
                        <th>用户</th>
                        <th>商品</th>
                        <th>数量</th>
                        <th>总价</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 新增：管理员管理 -->
        <h3><i class="fas fa-user-shield"></i> 管理员管理</h3>
        <button id="addAdminBtn" class="small" style="background:#1e3c72;">➕ 添加管理员</button>

        <!-- 添加管理员模态框 -->
        <div id="addAdminModal" class="modal">
            <div class="modal-content" style="max-width:400px;">
                <div class="modal-header">
                    <h3>添加管理员</h3>
                    <button id="closeAddAdminBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="text" id="newAdminName" placeholder="管理员昵称" style="width:100%; margin-bottom:12px; padding:10px; border-radius:12px; border:1px solid #cbd5e1;">
                    <input type="password" id="newAdminPwd1" placeholder="密码" style="width:100%; margin-bottom:12px; padding:10px; border-radius:12px; border:1px solid #cbd5e1;">
                    <input type="password" id="newAdminPwd2" placeholder="确认密码" style="width:100%; margin-bottom:12px; padding:10px; border-radius:12px; border:1px solid #cbd5e1;">
                    <button id="confirmAddAdminBtn" style="background:#28a745; color:white; border:none; padding:10px 20px; border-radius:30px; cursor:pointer;">确认添加</button>
                </div>
            </div>
        </div>

        <h3><i class="fas fa-database"></i> FAQ 管理</h3>
        <div class="input-area small"><input type="text" id="faqQ" placeholder="问题"><input type="text" id="faqA" placeholder="答案"><button class="small" id="addFaqBtn">添加/更新</button></div>
        <div style="overflow-x:auto;"><table id="faqTable"><thead><tr><th>问题</th><th>答案</th><th>操作</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- 模态框 -->
    <div id="loginModal" class="modal">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header"><h3>登录 / 注册</h3><button id="closeLoginBtn">&times;</button></div>
            <div class="modal-body">
                <div id="loginForm">
                    <input type="text" id="loginUsername" placeholder="用户名" autocomplete="off">
                    <input type="password" id="loginPassword" placeholder="密码">
                    <button id="doLoginBtn">登录</button>
                    <button id="showRegisterBtn">去注册</button>
                </div>
                <div id="registerForm" style="display:none;">
                    <input type="text" id="regUsername" placeholder="用户名">
                    <input type="password" id="regPassword" placeholder="密码">
                    <input type="password" id="regConfirmPassword" placeholder="确认密码">
                    <small style="color: #6c757d; display: block; margin-bottom: 12px;">密码必须同时包含字母和数字</small>
                    <button id="doRegisterBtn">注册</button>
                    <button id="backToLoginBtn">返回登录</button>
                </div>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>历史对话</h3><button id="closeHistoryBtn">&times;</button></div><div class="modal-body" id="historyModalBody"></div></div></div>
    <div id="orderModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>订单查询</h3><button id="closeOrderBtn">&times;</button></div><div class="modal-body"><input type="text" id="orderIdInput" placeholder="订单号 XD..."><button id="queryOrderBtn">查询</button><div id="orderResult"></div></div></div></div>

    <!-- 注册成功确认弹窗 -->
    <div id="registerSuccessModal" class="modal">
        <div class="modal-content" style="max-width:420px; text-align:center;">
            <div class="modal-header" style="background: linear-gradient(135deg, #10b981, #059669);">
                <h3>🎉 注册成功</h3>
            </div>
            <div class="modal-body" style="padding: 30px 20px;">
                <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
                <p style="font-size: 1.1rem; color: #1e293b; margin-bottom: 8px;">恭喜您成功注册 X-Drone 账号！</p>
                <p style="color: #64748b; margin-bottom: 24px;">现在可以开始与智能客服小智对话了</p>
                <button id="registerSuccessConfirmBtn" style="background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 14px 40px; border-radius: 30px; font-size: 1rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);">开始对话</button>
            </div>
        </div>
    </div>
</div>
<script src="/js/script.js"></script>
</body>
</html>
